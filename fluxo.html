<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Editor de Fluxo</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f1a;--panel:#0f1623;--card:#141c2e;--border:#1e2d47;
  --text:#e2e8f0;--soft:#64748b;--lime:#CEFF00;
  --red:#ef4444;--blue:#38bdf8;--green:#22c55e;--amber:#f59e0b;
  --purple:#a78bfa;--conn:#38bdf8;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}
.hdr{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--border);z-index:100;flex-shrink:0;}
.hdr-logo{font-size:13px;font-weight:800;color:var(--lime);letter-spacing:1px;opacity:.7;}
.hdr-title{flex:1;text-align:center;}
.hdr-title input{background:transparent;border:none;color:var(--text);font-size:14px;font-weight:700;text-align:center;width:200px;outline:none;}
.hdr-title input:focus{border-bottom:1px solid var(--lime);}
.hdr-btn{padding:7px 16px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:all .18s;}
.btn-limpar{background:transparent;border:1px solid var(--border);color:var(--soft);}
.btn-limpar:hover{border-color:var(--red);color:var(--red);}
.btn-pub{background:var(--green);color:#000;}
.btn-refresh{background:rgba(56,189,248,.12);border:1px solid rgba(56,189,248,.3);color:var(--blue);}
.btn-exp{background:rgba(206,255,0,.12);border:1px solid rgba(206,255,0,.3);color:var(--lime);}
.btn-exp:hover,.btn-refresh:hover{filter:brightness(1.2);}
.workspace{display:flex;flex:1;overflow:hidden;}
.sidebar{width:200px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:8px;}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);}
.sb-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--soft);padding:8px 4px 6px;}
.sb-node{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:10px;border:1px solid var(--border);background:var(--card);margin-bottom:6px;cursor:grab;font-size:12px;font-weight:600;color:var(--text);transition:all .18s;}
.sb-node:hover{border-color:var(--lime);color:var(--lime);transform:translateX(2px);}
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg);}
.canvas-wrap::before{content:"";position:absolute;inset:0;background-image:radial-gradient(circle,rgba(206,255,0,.04) 1px,transparent 1px);background-size:24px 24px;pointer-events:none;}
#canvas{position:absolute;inset:0;width:100%;height:100%;}
#svg-layer{position:absolute;inset:0;pointer-events:none;z-index:1;overflow:visible;}
#nodes-layer{position:absolute;inset:0;z-index:2;}
/* ── NÓ ── */
.node{position:absolute;min-width:195px;max-width:255px;background:var(--card);border:1.5px solid var(--border);border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.5);cursor:move;transition:border-color .15s,box-shadow .15s;}
.node:hover{box-shadow:0 6px 30px rgba(0,0,0,.65);}
.node.selected{border-color:var(--lime);box-shadow:0 0 0 2px rgba(206,255,0,.2);}
.node-hdr{display:flex;align-items:center;gap:7px;padding:10px 12px 8px;border-bottom:1px solid var(--border);border-radius:13px 13px 0 0;}
.node-icon{font-size:15px;flex-shrink:0;}
.node-type{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;flex:1;}
.node-del{background:transparent;border:none;color:var(--soft);font-size:13px;cursor:pointer;padding:2px 5px;border-radius:5px;line-height:1;transition:all .15s;}
.node-del:hover{color:var(--red);background:rgba(239,68,68,.12);}
.node-body{padding:10px 12px 12px;font-size:12px;color:var(--soft);}
.node-body textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:11px;resize:vertical;min-height:42px;padding:6px 8px;font-family:inherit;outline:none;line-height:1.5;}
.node-body textarea:focus{border-color:rgba(206,255,0,.3);}
.node-body input[type=text]{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:11px;padding:6px 8px;font-family:inherit;outline:none;margin-bottom:5px;}
.node-body input[type=text]:focus{border-color:rgba(206,255,0,.3);}
.node-body select{width:100%;background:rgba(8,14,28,.95);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:11px;padding:6px 8px;outline:none;}
.node-body select:focus{border-color:rgba(206,255,0,.3);}
.node-hint{font-size:10px;color:#475569;margin-top:5px;line-height:1.55;padding:5px 6px;background:rgba(255,255,255,.02);border-radius:5px;border-left:2px solid rgba(206,255,0,.2);}
/* ── OPT ROW ── */
.opt-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;padding:5px 8px;background:rgba(167,139,250,.07);border:1px solid rgba(167,139,250,.18);border-radius:8px;position:relative;overflow:visible;}
.port-opt-inline{position:absolute;right:-30px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;border:2.5px solid var(--purple);background:rgba(167,139,250,.12);cursor:crosshair;display:flex;align-items:center;justify-content:center;z-index:10;transition:transform .15s,box-shadow .15s;}
.port-opt-inline:hover{transform:translateY(-50%) scale(1.35);box-shadow:0 0 10px var(--purple);background:rgba(167,139,250,.35);}
.port-opt-inline .port-opt-lbl{font-size:9px;font-weight:800;color:var(--purple);line-height:1;pointer-events:none;}
.opt-row input{flex:1;margin:0!important;background:transparent!important;border:none!important;color:var(--text);font-size:11px;padding:1px 3px!important;outline:none;}
.opt-num{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;min-width:17px;border-radius:50%;background:rgba(167,139,250,.2);border:1px solid rgba(167,139,250,.45);color:var(--purple);font-size:9px;font-weight:800;}
.opt-del{background:transparent;border:none;color:rgba(239,68,68,.55);cursor:pointer;font-size:12px;padding:1px 4px;border-radius:4px;flex-shrink:0;line-height:1;transition:all .15s;}
.opt-del:hover{color:var(--red);background:rgba(239,68,68,.12);}
.btn-add-opt{width:100%;background:rgba(206,255,0,.05);border:1px dashed rgba(206,255,0,.2);border-radius:7px;color:rgba(206,255,0,.65);font-size:11px;font-weight:700;padding:5px;cursor:pointer;margin-top:6px;transition:all .18s;}
.btn-add-opt:hover{background:rgba(206,255,0,.1);border-color:rgba(206,255,0,.4);color:var(--lime);}
/* ── PORTAS ── */
.port{position:absolute;width:20px;height:20px;border-radius:50%;border:2.5px solid;cursor:crosshair;transition:transform .15s,box-shadow .15s;z-index:10;display:flex;align-items:center;justify-content:center;}
.port:hover{transform:scale(1.4);box-shadow:0 0 12px currentColor;}
.port::after{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.5;}
.port-out{border-color:var(--lime);color:var(--lime);background:rgba(206,255,0,.1);right:-11px;}
.port-in{border-color:var(--blue);color:var(--blue);background:rgba(56,189,248,.1);left:-11px;}
.port-opt{border-color:var(--purple)!important;color:var(--purple)!important;background:rgba(167,139,250,.1)!important;right:-11px;width:20px!important;height:20px!important;}
.port-opt:hover{background:rgba(167,139,250,.3)!important;transform:scale(1.35);}
.port-opt::after{display:none;}
.port-opt-lbl{font-size:9px;font-weight:800;color:var(--purple);line-height:1;pointer-events:none;}
/* ── CONEXÕES ── */
.conn-line{stroke:var(--conn);stroke-width:1.8;fill:none;stroke-dasharray:5 3;animation:dash 1.5s linear infinite;}
@keyframes dash{to{stroke-dashoffset:-20;}}
.conn-line.solid{stroke-dasharray:none;animation:none;}
.conn-arrow{fill:var(--conn);}
.mini-panel{position:absolute;bottom:16px;right:16px;display:flex;gap:8px;z-index:50;}
.mp-btn{width:34px;height:34px;border-radius:8px;background:var(--panel);border:1px solid var(--border);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;}
.mp-btn:hover{border-color:var(--lime);color:var(--lime);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:#000;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:all .3s;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:var(--red);color:#fff;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal-box{background:var(--panel);border:1px solid var(--border);border-radius:16px;width:560px;max-width:95vw;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;}
.modal-box h3{padding:16px 20px;font-size:15px;border-bottom:1px solid var(--border);}
.modal-box textarea{flex:1;background:#0a0f1a;color:#7dd3fc;font-family:monospace;font-size:11px;padding:16px;border:none;outline:none;resize:none;min-height:300px;}
.modal-box .modal-foot{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border);justify-content:flex-end;}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logo">ERA</div>
  <div class="hdr-title"><input id="flowName" value="Fluxo de Atendimento" placeholder="Nome do fluxo"></div>
  <button class="hdr-btn btn-refresh" onclick="atualizarDadosCaderno()">🔄 Atualizar dados</button>
  <button class="hdr-btn btn-exp" onclick="exportarJSON()">⬇ Exportar JSON</button>
  <button class="hdr-btn btn-limpar" onclick="confirmarLimpar()">Limpar</button>
  <button class="hdr-btn btn-pub" onclick="salvarFluxo()">✓ Salvar Fluxo</button>
</div>
<div class="workspace">
  <div class="sidebar">
    <div class="sb-title">Nós do Fluxo</div>
    <div class="sb-node" draggable="true" data-type="start"><span style="width:10px;height:10px;border-radius:50%;background:#22c55e;flex-shrink:0;display:inline-block"></span>Start</div>
    <div class="sb-node" draggable="true" data-type="mensagem"><span style="width:10px;height:10px;border-radius:50%;background:#38bdf8;flex-shrink:0;display:inline-block"></span>Enviar Mensagem</div>
    <div class="sb-node" draggable="true" data-type="menu"><span style="width:10px;height:10px;border-radius:50%;background:#a78bfa;flex-shrink:0;display:inline-block"></span>Menu de Opções</div>
    <div class="sb-node" draggable="true" data-type="horario"><span style="width:10px;height:10px;border-radius:50%;background:#f59e0b;flex-shrink:0;display:inline-block"></span>Regra de Horário</div>
    <div class="sb-node" draggable="true" data-type="dados"><span style="width:10px;height:10px;border-radius:50%;background:#f472b6;flex-shrink:0;display:inline-block"></span>Solicitar Dados</div>
    <div class="sb-node" draggable="true" data-type="agente"><span style="width:10px;height:10px;border-radius:50%;background:#fb923c;flex-shrink:0;display:inline-block"></span>Transferir Agente</div>
    <div class="sb-node" draggable="true" data-type="depto"><span style="width:10px;height:10px;border-radius:50%;background:#34d399;flex-shrink:0;display:inline-block"></span>Departamento</div>
    <div class="sb-node" draggable="true" data-type="espera"><span style="width:10px;height:10px;border-radius:50%;background:#94a3b8;flex-shrink:0;display:inline-block"></span>Tempo de Espera</div>
    <div class="sb-node" draggable="true" data-type="finalizar"><span style="width:10px;height:10px;border-radius:50%;background:#ef4444;flex-shrink:0;display:inline-block"></span>Finalizar</div>
    <div class="sb-title" style="margin-top:12px">Como usar</div>
    <div style="font-size:11px;color:var(--soft);line-height:1.7;padding:4px 2px;">
      Arraste um nó para a tela.<br>
      <span style="color:var(--lime)">●</span> saída → <span style="color:var(--blue)">●</span> entrada para conectar.<br>
      <span style="color:var(--purple)">●</span> = saída de cada opção.<br>
      <span style="color:#22c55e">●</span> dentro / <span style="color:#ef4444">●</span> fora do horário.
    </div>
  </div>
  <div class="canvas-wrap" id="canvasWrap">
    <div id="canvas">
      <svg id="svg-layer" xmlns="http://www.w3.org/2000/svg" overflow="visible" style="overflow:visible;">
        <defs>
          <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0 0L6 3L0 6Z" class="conn-arrow"/>
          </marker>
          <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0 0L6 3L0 6Z" fill="#22c55e"/>
          </marker>
          <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0 0L6 3L0 6Z" fill="#ef4444"/>
          </marker>
        </defs>
      </svg>
      <div id="nodes-layer"></div>
    </div>
    <div class="mini-panel">
      <button class="mp-btn" onclick="zoom(1.15)">+</button>
      <button class="mp-btn" onclick="zoom(0.87)">−</button>
      <button class="mp-btn" onclick="resetView()">⊙</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="modal-bg" id="modalJSON">
  <div class="modal-box">
    <h3>📋 JSON do Fluxo</h3>
    <textarea id="jsonOutput" readonly></textarea>
    <div class="modal-foot">
      <button class="hdr-btn btn-exp" onclick="copiarJSON()">Copiar</button>
      <button class="hdr-btn btn-limpar" onclick="fecharModal()">Fechar</button>
    </div>
  </div>
</div>
<script>
let nodes=[],conns=[],nodeId=1,scale=1,offsetX=0,offsetY=0;
let dragging=null,dragOffX=0,dragOffY=0,connectingFrom=null,selected=null,_connJustMade=false;
const wrap=document.getElementById("canvasWrap"),canvas=document.getElementById("canvas");
const svgL=document.getElementById("svg-layer"),nodesL=document.getElementById("nodes-layer");

const CFG={
  start:    {label:"Start",           icon:"🟢",color:"#22c55e",hasIn:false,hasOut:true },
  mensagem: {label:"Enviar Mensagem", icon:"✉️", color:"#38bdf8",hasIn:true, hasOut:true },
  menu:     {label:"Menu de Opções",  icon:"📋", color:"#a78bfa",hasIn:true, hasOut:false},
  // ✅ horario agora tem hasOut:false — portas controladas manualmente
  horario:  {label:"Regra de Horário",icon:"⏰", color:"#f59e0b",hasIn:true, hasOut:false},
  dados:    {label:"Solicitar Dados", icon:"📝", color:"#f472b6",hasIn:true, hasOut:true },
  agente:   {label:"Transf. Agente",  icon:"👤", color:"#fb923c",hasIn:true, hasOut:false},
  depto:    {label:"Departamento",    icon:"🏢", color:"#34d399",hasIn:true, hasOut:false},
  espera:   {label:"Tempo de Espera", icon:"⏱️", color:"#94a3b8",hasIn:true, hasOut:true },
  finalizar:{label:"Finalizar",       icon:"🔴", color:"#ef4444",hasIn:true, hasOut:false},
};

function applyT(){canvas.style.transform=`translate(${offsetX}px,${offsetY}px) scale(${scale})`;canvas.style.transformOrigin="0 0";}
function zoom(f){scale=Math.max(0.3,Math.min(2.5,scale*f));applyT();}
function resetView(){scale=1;offsetX=0;offsetY=0;applyT();}
function toCV(cx,cy){const r=wrap.getBoundingClientRect();return{x:(cx-r.left-offsetX)/scale,y:(cy-r.top-offsetY)/scale};}

let pan=false,px0=0,py0=0,pox=0,poy=0;
wrap.addEventListener("mousedown",e=>{
  if(e.target===wrap||e.target===canvas||e.target===svgL||e.target===nodesL){
    pan=true;px0=e.clientX;py0=e.clientY;pox=offsetX;poy=offsetY;
    selected=null;renderAll();e.preventDefault();
  }
});
window.addEventListener("mousemove",e=>{
  if(pan){offsetX=pox+(e.clientX-px0);offsetY=poy+(e.clientY-py0);applyT();}
  if(dragging){const p=toCV(e.clientX,e.clientY);dragging.x=Math.max(0,p.x-dragOffX);dragging.y=Math.max(0,p.y-dragOffY);const el=document.getElementById("n-"+dragging.id);if(el){el.style.left=dragging.x+"px";el.style.top=dragging.y+"px";}renderConnections();}
  if(connectingFrom!=null){const p=toCV(e.clientX,e.clientY);renderConnections(p.x,p.y);}
});
window.addEventListener("mouseup",e=>{
  pan=false;dragging=null;
  if(_connJustMade){_connJustMade=false;return;}
  if(connectingFrom!=null){
    let el=document.elementFromPoint(e.clientX,e.clientY),hit=false;
    while(el&&el!==document.body){if(el.classList?.contains("port-in")){hit=true;break;}el=el.parentElement;}
    if(!hit){connectingFrom=null;renderConnections();}
  }
});
wrap.addEventListener("wheel",e=>{e.preventDefault();zoom(e.deltaY<0?1.08:0.93);},{passive:false});
document.querySelectorAll(".sb-node").forEach(el=>el.addEventListener("dragstart",e=>e.dataTransfer.setData("nodeType",el.dataset.type)));
wrap.addEventListener("dragover",e=>e.preventDefault());
wrap.addEventListener("drop",e=>{e.preventDefault();const t=e.dataTransfer.getData("nodeType");if(!t)return;const r=wrap.getBoundingClientRect();addNode(t,Math.max(10,(e.clientX-r.left-offsetX)/scale-95),Math.max(10,(e.clientY-r.top-offsetY)/scale-40));});

function addNode(type,x,y){const c=CFG[type];if(!c)return;const n={id:nodeId++,type,x,y,data:{text:"",opcoes:[],campo:"",horario:""}};nodes.push(n);renderNode(n);renderConnections();return n;}

function renderNode(n){
  const c=CFG[n.type];
  let el=document.getElementById("n-"+n.id);
  if(!el){el=document.createElement("div");el.className="node";el.id="n-"+n.id;nodesL.appendChild(el);}
  el.style.left=n.x+"px";el.style.top=n.y+"px";
  el.classList.toggle("selected",selected===n.id);

  let b=`<div class="node-hdr" style="background:${c.color}18;border-bottom-color:${c.color}35;">
    <span class="node-icon">${c.icon}</span>
    <span class="node-type" style="color:${c.color}">${c.label}</span>
    <button class="node-del" onclick="delNode(${n.id})">✕</button>
  </div><div class="node-body">`;

  if(n.type==="start"){
    b+=`<div style="color:#22c55e;font-size:12px;font-weight:600;padding:3px 0;">▶ Início do fluxo</div>`;
  } else if(n.type==="mensagem"){
    b+=`<textarea placeholder="Mensagem enviada ao cliente..." onchange="ns(${n.id},'text',this.value)">${n.data.text||""}</textarea>`;
  } else if(n.type==="menu"){
    b+=`<textarea placeholder="Mensagem apresentada antes das opções..." onchange="ns(${n.id},'text',this.value)" style="min-height:36px;margin-bottom:7px;">${n.data.text||""}</textarea>`;
    b+=`<div id="opts-${n.id}">`;
    (n.data.opcoes||[]).forEach((op,i)=>{
      b+=`<div class="opt-row" data-i="${i}">
        <span class="opt-num">${i+1}</span>
        <input type="text" placeholder="Opção ${i+1}..." value="${(op||"").replace(/"/g,"&quot;")}" onchange="no(${n.id},${i},this.value)">
        <button class="opt-del" onclick="nd(${n.id},${i})">✕</button>
        <div class="port-opt-inline" data-opt="${i}" onmousedown="pOut(event,${n.id},'opt_${i}')" title="Conectar saída da opção ${i+1}"><span class="port-opt-lbl">${i+1}</span></div>
      </div>`;
    });
    b+=`</div><button class="btn-add-opt" onclick="na(${n.id})">＋ Adicionar opção</button>`;

  // ✅ HORARIO — duas portas de saída inline (verde e vermelha)
  } else if(n.type==="horario"){
    const _r=getRegrasTempo();
    if(_r.length){
      b+=`<select onchange="ns(${n.id},'horario',this.value)"><option value="">— Selecione a regra —</option>${_r.map(r=>`<option value="${r}" ${n.data.horario===r?"selected":""}>${r}</option>`).join("")}</select>`;
    } else {
      b+=`<select onchange="ns(${n.id},'horario',this.value)"><option value="comercial" ${n.data.horario==="comercial"?"selected":""}>Horário Comercial</option><option value="fora" ${n.data.horario==="fora"?"selected":""}>Fora do Horário</option></select>`;
    }
    b+=`
    <div style="margin-top:8px;display:flex;flex-direction:column;gap:5px;">
      <div style="display:flex;align-items:center;gap:7px;padding:5px 8px;background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.22);border-radius:8px;position:relative;">
        <span style="font-size:11px;">✅</span>
        <span style="font-size:10px;color:#22c55e;flex:1;font-weight:600;">Dentro do horário</span>
        <div class="port-horario-out" data-pk="out_dentro"
          style="width:20px;height:20px;border-radius:50%;border:2.5px solid #22c55e;background:rgba(34,197,94,.15);cursor:crosshair;display:flex;align-items:center;justify-content:center;margin-right:-4px;flex-shrink:0;transition:transform .15s,box-shadow .15s;"
          onmousedown="pOut(event,${n.id},'out_dentro')"
          onmouseover="this.style.transform='scale(1.35)';this.style.boxShadow='0 0 10px #22c55e'"
          onmouseout="this.style.transform='';this.style.boxShadow=''">

          onmousedown="pOut(event,${n.id},'out_fora')"

  } else if(n.type==="dados"){

    } else {

      b+=`<div class="node-hint">Cadastre agentes no formulário e clique 🔄</div>`;
    }
  } else if(n.type==="depto"){
    const _d=getDepartamentos();
    if(_d.length){
      b+=`<select onchange="ns(${n.id},'text',this.value)" style="border-color:rgba(52,211,153,.3)"><option value="">— Selecione o departamento —</option>${_d.map(d=>`<option value="${d}" ${n.data.text===d?"selected":""}>${d}</option>`).join("")}</select>`;
    } else {
      b+=`<input type="text" placeholder="Nome do departamento" value="${(n.data.text||"").replace(/"/g,"&quot;")}" onchange="ns(${n.id},'text',this.value)" style="border-color:rgba(52,211,153,.3)">`;
      b+=`<div class="node-hint">Crie departamentos no formulário e clique 🔄</div>`;
    }
  } else if(n.type==="espera"){

  } else if(n.type==="finalizar"){
    b+=`<textarea placeholder="👋 Mensagem de encerramento..." onchange="ns(${n.id},'text',this.value)">${n.data.text||""}</textarea>`;
  }
  b+=`</div>`;

  // Porta entrada (meio do header)
  if(c.hasIn) b+=`<div class="port port-in" style="top:16px" onmouseup="pIn(${n.id},event)"></div>`;
  // Porta saída única (não-menu, não-horario)
  if(c.hasOut) b+=`<div class="port port-out" style="top:16px" onmousedown="pOut(event,${n.id})"></div>`;

  el.innerHTML=b;

  el.addEventListener("mousedown",e=>{
    if(e.target.classList.contains("port")||e.target.classList.contains("port-horario-out")||e.target.classList.contains("port-opt-inline")||e.target.tagName==="BUTTON"||e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA"||e.target.tagName==="SELECT") return;

    dragOffY=(e.clientY-wR.top-offsetY)/scale-n.y;

  });
}

window.ns=(id,k,v)=>{const n=nodes.find(x=>x.id===id);if(n)n.data[k]=v;};
window.na=(id)=>{const n=nodes.find(x=>x.id===id);if(!n)return;if(!n.data.opcoes)n.data.opcoes=[];n.data.opcoes.push("");renderNode(n);renderConnections();};
window.nd=(id,i)=>{
  const n=nodes.find(x=>x.id===id);if(!n)return;
  n.data.opcoes.splice(i,1);
  conns=conns.filter(c=>!(c.from===id&&c.portKey===`opt_${i}`));
  conns=conns.map(c=>{if(c.from===id&&c.portKey?.startsWith("opt_")){const idx=parseInt(c.portKey.replace("opt_",""));if(idx>i)return{...c,portKey:`opt_${idx-1}`};}return c;});

window.no=(id,i,v)=>{const n=nodes.find(x=>x.id===id);if(n)n.data.opcoes[i]=v;};
window.delNode=(id)=>{nodes=nodes.filter(x=>x.id!==id);conns=conns.filter(c=>c.from!==id&&c.to!==id);const el=document.getElementById("n-"+id);if(el)el.remove();if(selected===id)selected=null;renderConnections();};
function pOut(e,nid,pk){connectingFrom={nodeId:nid,portKey:pk||"default"};e.stopPropagation();}
window.pIn=(nid,e)=>{
  if(e)e.stopPropagation();
  if(connectingFrom!=null&&connectingFrom.nodeId!==nid){
    const{nodeId:from,portKey}=connectingFrom;
    if(!conns.find(c=>c.from===from&&c.to===nid&&c.portKey===portKey)) conns.push({from,to:nid,portKey});
    connectingFrom=null;_connJustMade=true;renderConnections();
  }
};

// ✅ getPortPos: suporta portas inline do horario (out_dentro / out_fora)
function getPortPos(nid,side,pk){
  const n=nodes.find(x=>x.id===nid);if(!n)return null;
  const el=document.getElementById("n-"+nid);if(!el)return null;
  const HDR_MID=26;
  if(side==="in") return{x:n.x, y:n.y+HDR_MID};

  // Portas de opção do menu
  if(n.type==="menu"&&pk?.startsWith("opt_")){
    const i=parseInt(pk.replace("opt_",""));
    const inlinePorts=el.querySelectorAll(".port-opt-inline");
    if(inlinePorts[i]){
      const pr=inlinePorts[i].getBoundingClientRect();
      const wr=wrap.getBoundingClientRect();
      const cx=(pr.left+pr.width/2-wr.left-offsetX)/scale;
      const cy=(pr.top+pr.height/2-wr.top-offsetY)/scale;
      return{x:cx, y:cy};
    }
  }

  // ✅ Portas do horário (dentro / fora)
  if(n.type==="horario"&&(pk==="out_dentro"||pk==="out_fora")){
    const ports=el.querySelectorAll(".port-horario-out");
    const target=Array.from(ports).find(p=>p.dataset.pk===pk);
    if(target){
      const pr=target.getBoundingClientRect();
      const wr=wrap.getBoundingClientRect();
      return{
        x:(pr.left+pr.width/2-wr.left-offsetX)/scale,
        y:(pr.top+pr.height/2-wr.top-offsetY)/scale
      };
    }
  }

  return{x:n.x+el.offsetWidth, y:n.y+HDR_MID};
}

function renderConnections(px,py){
  svgL.querySelectorAll("path,g.lbl").forEach(e=>e.remove());
  conns.forEach(c=>{
    const a=getPortPos(c.from,"out",c.portKey),b=getPortPos(c.to,"in");
    if(!a||!b)return;

    // ✅ Cor da conexão por tipo de porta
    const isO=c.portKey?.startsWith("opt_");
    const isDentro=c.portKey==="out_dentro";
    const isFora=c.portKey==="out_fora";
    const col=isO?"#a78bfa":isDentro?"#22c55e":isFora?"#ef4444":"#38bdf8";
    const markerId=isDentro?"arr-green":isFora?"arr-red":"arr";

    drawC(a.x,a.y,b.x,b.y,"solid",col,markerId);

    // Label nas opções de menu
    if(isO){
      const i=parseInt(c.portKey.replace("opt_",""))+1;
      const mx=(a.x+b.x)/2,my=(a.y+b.y)/2-9;
      const g=document.createElementNS("http://www.w3.org/2000/svg","g");g.setAttribute("class","lbl");
      const bg=document.createElementNS("http://www.w3.org/2000/svg","rect");
      bg.setAttribute("x",mx-16);bg.setAttribute("y",my-8);bg.setAttribute("width","32");bg.setAttribute("height","12");bg.setAttribute("rx","4");bg.setAttribute("fill","#0a0f1a");bg.setAttribute("opacity","0.9");
      const t=document.createElementNS("http://www.w3.org/2000/svg","text");
      t.setAttribute("x",mx);t.setAttribute("y",my+1);t.setAttribute("text-anchor","middle");t.setAttribute("font-size","8");t.setAttribute("fill","#a78bfa");t.setAttribute("font-weight","bold");
      t.textContent=`Op.${i}`;g.appendChild(bg);g.appendChild(t);svgL.appendChild(g);
    }

    // ✅ Label nas conexões de horário
    if(isDentro||isFora){
      const mx=(a.x+b.x)/2,my=(a.y+b.y)/2-9;
      const lbl=isDentro?"Dentro":"Fora";
      const g=document.createElementNS("http://www.w3.org/2000/svg","g");g.setAttribute("class","lbl");
      const bg=document.createElementNS("http://www.w3.org/2000/svg","rect");
      const lw=lbl.length*5+10;
      bg.setAttribute("x",mx-lw/2);bg.setAttribute("y",my-8);bg.setAttribute("width",lw);bg.setAttribute("height","12");bg.setAttribute("rx","4");bg.setAttribute("fill","#0a0f1a");bg.setAttribute("opacity","0.9");
      const t=document.createElementNS("http://www.w3.org/2000/svg","text");
      t.setAttribute("x",mx);t.setAttribute("y",my+1);t.setAttribute("text-anchor","middle");t.setAttribute("font-size","8");t.setAttribute("fill",col);t.setAttribute("font-weight","bold");
      t.textContent=lbl;g.appendChild(bg);g.appendChild(t);svgL.appendChild(g);
    }
  });
  if(connectingFrom!=null&&px!==undefined){const a=getPortPos(connectingFrom.nodeId,"out",connectingFrom.portKey);if(a)drawC(a.x,a.y,px,py,"dash","#CEFF00","arr");}
}

function drawC(x1,y1,x2,y2,style,color,markerId){
  const dx=Math.max(40,Math.abs(x2-x1)*0.5);
  const d=`M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`;
  const p=document.createElementNS("http://www.w3.org/2000/svg","path");
  p.setAttribute("d",d);p.setAttribute("class","conn-line"+(style==="solid"?" solid":""));
  if(color)p.setAttribute("stroke",color);
  p.setAttribute("marker-end","url(#"+(markerId||"arr")+")");
  svgL.appendChild(p);
}

function salvarFluxo(){
  const nome=document.getElementById("flowName").value.trim()||"Fluxo sem nome";
  toast("Gerando imagem...");
  capturarImagem().then(img=>{
    try{
      let raw=null;
      if(window.opener&&!window.opener.closed){try{raw=window.opener.localStorage.getItem("CONFIG_CADERNO");}catch(e){}}
      if(!raw)raw=localStorage.getItem("CONFIG_CADERNO");
      const cad=raw&&raw!=="null"?JSON.parse(raw):{};
      if(!cad.chat)cad.chat={};if(!cad.chat.fluxos)cad.chat.fluxos=[];
      const fid=_editId||("fluxo_"+Date.now());_editId=fid;

    }catch(err){toast("Erro: "+err.message,true);}
  });

function capturarImagem(){
  return new Promise(resolve=>{
    if(!nodes.length){resolve(null);return;}
    let mx=Infinity,my=Infinity,Mx=-Infinity,My=-Infinity;
    nodes.forEach(n=>{const el=document.getElementById("n-"+n.id);const w=el?el.offsetWidth:220,h=el?el.offsetHeight:140;mx=Math.min(mx,n.x);my=Math.min(my,n.y);Mx=Math.max(Mx,n.x+w);My=Math.max(My,n.y+h);});
    const P=48,SC=1.4,cW=((Mx-mx)+P*2)*SC,cH=((My-my)+P*2)*SC;
    const cv=document.createElement("canvas");cv.width=Math.min(cW,2400);cv.height=Math.min(cH,1800);
    const s=Math.min(cv.width/cW,cv.height/cH,1),sc=SC*s,ox=(P-mx)*SC,oy=(P-my)*SC;
    const ctx=cv.getContext("2d");
    ctx.fillStyle="#0a0f1a";ctx.fillRect(0,0,cv.width,cv.height);
    ctx.fillStyle="rgba(206,255,0,0.035)";
    for(let gx=0;gx<cv.width;gx+=20*s)for(let gy=0;gy<cv.height;gy+=20*s)ctx.fillRect(gx,gy,1.5*s,1.5*s);
    ctx.save();
    conns.forEach(c=>{
      const nA=nodes.find(x=>x.id===c.from),nB=nodes.find(x=>x.id===c.to);if(!nA||!nB)return;
      const elA=document.getElementById("n-"+nA.id);const wA=elA?elA.offsetWidth:220;
      const isO=c.portKey?.startsWith("opt_");
      const isDentro=c.portKey==="out_dentro";
      const isFora=c.portKey==="out_fora";
      const col=isO?"#a78bfa":isDentro?"#22c55e":isFora?"#ef4444":"#38bdf8";
      const x2=nB.x*sc+ox*s,y2=nB.y*sc+oy*s+26*sc;
      if(isO&&c.portKey){
        const i=parseInt(c.portKey.replace("opt_",""));
        const body=elA?elA.querySelector(".node-body"):null;
        const rows=elA?elA.querySelectorAll(".opt-row"):[];
        let pY=26+40+i*30+15;
        if(body&&rows[i]) pY=body.offsetTop+rows[i].offsetTop+rows[i].offsetHeight/2;
        const px1=nA.x*sc+ox*s+wA*sc;
        const py1=nA.y*sc+oy*s+pY*sc;
        _dc(ctx,px1,py1,x2,y2,col,sc);
        ctx.font=`bold ${9*sc}px 'Segoe UI',sans-serif`;ctx.textAlign="center";
        const mx2=(px1+x2)/2,my2=(py1+y2)/2-6*sc;
        ctx.fillStyle="rgba(10,15,26,0.85)";const lw=ctx.measureText("Op."+(i+1)).width+8*sc;
        ctx.fillRect(mx2-lw/2,my2-8*sc,lw,12*sc);ctx.fillStyle=col;ctx.fillText("Op."+(i+1),mx2,my2);
      } else if(isDentro||isFora){
        // Porta do horário — usa getBoundingClientRect real
        const ports=elA?elA.querySelectorAll(".port-horario-out"):[];
        const target=Array.from(ports).find(p=>p.dataset.pk===c.portKey);
        if(target){
          const pr=target.getBoundingClientRect();
          const wr=wrap.getBoundingClientRect();
          const px1=(pr.left+pr.width/2-wr.left-offsetX)/scale*sc+ox*s;
          const py1=(pr.top+pr.height/2-wr.top-offsetY)/scale*sc+oy*s;
          _dc(ctx,px1,py1,x2,y2,col,sc);
          const lbl=isDentro?"Dentro":"Fora";
          const mx2=(px1+x2)/2,my2=(py1+y2)/2-6*sc;
          ctx.font=`bold ${9*sc}px 'Segoe UI',sans-serif`;ctx.textAlign="center";
          ctx.fillStyle="rgba(10,15,26,0.85)";const lw2=ctx.measureText(lbl).width+8*sc;
          ctx.fillRect(mx2-lw2/2,my2-8*sc,lw2,12*sc);ctx.fillStyle=col;ctx.fillText(lbl,mx2,my2);
        }
      } else {
        _dc(ctx,nA.x*sc+ox*s+wA*sc,nA.y*sc+oy*s+26*sc,x2,y2,col,sc);
      }
    });
    ctx.restore();
    nodes.forEach(n=>{
      const c=CFG[n.type];const el=document.getElementById("n-"+n.id);
      const w=(el?el.offsetWidth:220)*sc,h=(el?el.offsetHeight:140)*sc;
      const x=n.x*sc+ox*s,y=n.y*sc+oy*s,r=10*sc;
      ctx.shadowColor="rgba(0,0,0,0.55)";ctx.shadowBlur=18*sc;ctx.fillStyle="#141c2e";_rr(ctx,x,y,w,h,r);ctx.fill();ctx.shadowBlur=0;
      ctx.globalAlpha=0.14;ctx.fillStyle=c.color;_rrTop(ctx,x,y,w,38*sc,r);ctx.fill();ctx.globalAlpha=1;
      ctx.strokeStyle="#1e2d47";ctx.lineWidth=1.5*sc;_rr(ctx,x,y,w,h,r);ctx.stroke();
      ctx.fillStyle=c.color;ctx.fillRect(x,y+r,3.5*sc,38*sc-r);
      ctx.strokeStyle=c.color+"50";ctx.lineWidth=0.8*sc;ctx.beginPath();ctx.moveTo(x+r,y+38*sc);ctx.lineTo(x+w-r,y+38*sc);ctx.stroke();
      ctx.font=`700 ${9*sc}px 'Segoe UI',sans-serif`;ctx.fillStyle=c.color;ctx.textAlign="left";ctx.textBaseline="middle";
      ctx.fillText(c.label.toUpperCase(),x+12*sc,y+19*sc);
      ctx.fillStyle="#94a3b8";ctx.font=`${10*sc}px 'Segoe UI',sans-serif`;
      const mw=w-24*sc;let ty=y+48*sc;
      if(n.type==="mensagem"||n.type==="finalizar"){_wt(ctx,n.data.text||"",mw).slice(0,5).forEach(l=>{ctx.fillText(l,x+12*sc,ty);ty+=13*sc;});}
      else if(n.type==="menu"){
        _wt(ctx,n.data.text||"",mw).slice(0,2).forEach(l=>{ctx.fillText(l,x+12*sc,ty);ty+=12*sc;});ty+=3*sc;
        (n.data.opcoes||[]).forEach((op,i)=>{
          const txt=`${i+1}. ${op||"Opcao "+(i+1)}`;
          ctx.fillStyle="rgba(167,139,250,0.1)";const pw=Math.min(ctx.measureText(txt).width+14*sc,mw);
          ctx.fillRect(x+10*sc,ty-8*sc,pw,17*sc);ctx.strokeStyle="rgba(167,139,250,0.28)";ctx.lineWidth=0.8*sc;ctx.strokeRect(x+10*sc,ty-8*sc,pw,17*sc);
          ctx.fillStyle="#a78bfa";ctx.font=`600 ${9*sc}px 'Segoe UI',sans-serif`;ctx.fillText(txt,x+17*sc,ty);
          ctx.font=`${10*sc}px 'Segoe UI',sans-serif`;ty+=19*sc;
        });
      }
      else if(n.type==="horario"){
        ctx.fillStyle="#f59e0b";ctx.font=`600 ${10*sc}px 'Segoe UI',sans-serif`;ctx.fillText((n.data.horario||"Horário Comercial"),x+12*sc,ty);ty+=16*sc;
        // Pinta as bolinhas no canvas de exportação
        _porto(ctx,x+w-6*sc,ty+2*sc,"#22c55e",sc);
        ctx.fillStyle="#22c55e";ctx.font=`${9*sc}px 'Segoe UI',sans-serif`;ctx.fillText("Dentro",x+12*sc,ty+2*sc);ty+=16*sc;
        _porto(ctx,x+w-6*sc,ty+2*sc,"#ef4444",sc);
        ctx.fillStyle="#ef4444";ctx.fillText("Fora",x+12*sc,ty+2*sc);
      }
      else if(n.type==="dados"){ctx.fillText("Campo: "+(n.data.campo||"—"),x+12*sc,ty);ty+=13*sc;_wt(ctx,n.data.text||"",mw).slice(0,2).forEach(l=>{ctx.fillText(l,x+12*sc,ty);ty+=12*sc;});}
      else if(n.type==="agente"){ctx.fillStyle="#fb923c";ctx.fillText(n.data.text||"Qualquer agente",x+12*sc,ty);}
      else if(n.type==="depto"){ctx.fillStyle="#34d399";ctx.fillText(n.data.text||"Departamento",x+12*sc,ty);}
      else if(n.type==="espera"){ctx.fillStyle="#94a3b8";ctx.fillText(n.data.text||"Aguardando...",x+12*sc,ty);}
      else if(n.type==="start"){ctx.fillStyle="#22c55e";ctx.font=`600 ${10*sc}px 'Segoe UI',sans-serif`;ctx.fillText("Inicio do fluxo",x+12*sc,ty);}
      if(c.hasOut&&n.type!=="menu"&&n.type!=="horario"){_porto(ctx,x+w,y+26*sc,"#CEFF00",sc);}
      if(n.type==="menu"){
        const body=el?el.querySelector(".node-body"):null;
        const rows=el?el.querySelectorAll(".opt-row"):[];
        (n.data.opcoes||[]).forEach((op,i)=>{
          let pY=26+40+i*30+15;
          if(body&&rows[i]) pY=body.offsetTop+rows[i].offsetTop+rows[i].offsetHeight/2;
          _porto(ctx,x+w,y+pY*sc,"#a78bfa",sc);
        });
      }
      if(c.hasIn){_porto(ctx,x,y+26*sc,"#38bdf8",sc);}
    });
    ctx.font=`${9*sc}px 'Segoe UI',sans-serif`;ctx.fillStyle="rgba(206,255,0,0.25)";ctx.textAlign="right";
    ctx.fillText("Caderno de Parâmetros · SobreIP",cv.width-10*s,cv.height-6*s);
    resolve(cv.toDataURL("image/jpeg",0.85));
  });
}

function _porto(ctx,x,y,col,sc){ctx.strokeStyle=col;ctx.lineWidth=2*sc;ctx.fillStyle="#0a0f1a";ctx.beginPath();ctx.arc(x,y,5.5*sc,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle=col.replace(")",",0.3)").replace("rgb","rgba")||col+"44";ctx.beginPath();ctx.arc(x,y,2.5*sc,0,Math.PI*2);ctx.fill();}
function _dc(ctx,x1,y1,x2,y2,col,sc){const dx=Math.max(40*sc,Math.abs(x2-x1)*0.5);ctx.strokeStyle=col;ctx.lineWidth=1.8*sc;ctx.setLineDash([]);ctx.beginPath();ctx.moveTo(x1,y1);ctx.bezierCurveTo(x1+dx,y1,x2-dx,y2,x2,y2);ctx.stroke();const ang=Math.atan2(y2-y1,x2-x1);ctx.save();ctx.translate(x2,y2);ctx.rotate(ang);ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-9*sc,-4*sc);ctx.lineTo(-9*sc,4*sc);ctx.closePath();ctx.fill();ctx.restore();}
function _wt(ctx,text,mw){if(!text)return[];const words=text.split(" "),lines=[];let cur="";words.forEach(w=>{const t=cur?cur+" "+w:w;if(ctx.measureText(t).width>mw){lines.push(cur);cur=w;}else cur=t;});if(cur)lines.push(cur);return lines;}
function _rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function _rrTop(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h);ctx.lineTo(x,y+h);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function confirmarLimpar(){if(!nodes.length||confirm("Limpar todo o fluxo?")){nodes=[];conns=[];nodesL.innerHTML="";renderConnections();toast("Fluxo limpo");}}
function toast(msg,err=false){const t=document.getElementById("toast");t.textContent=msg;t.className="toast show"+(err?" err":"");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2500);}
window.addEventListener("keydown",e=>{
  if(e.key==="Escape"&&connectingFrom!=null){connectingFrom=null;renderConnections();}
  if((e.key==="Delete"||e.key==="Backspace")&&selected){const tag=document.activeElement?.tagName?.toLowerCase();if(tag!=="input"&&tag!=="textarea"){delNode(selected);selected=null;}}
});
wrap.addEventListener("click",e=>{if(e.target===wrap||e.target===canvas||e.target===svgL||e.target===nodesL){if(connectingFrom!=null){connectingFrom=null;renderConnections();}}});

function getDadosCaderno(){
  try{
    if(window.opener&&!window.opener.closed){
      try{
        const od=window.opener.document,ol=window.opener.localStorage;
        const base=JSON.parse(ol.getItem("CONFIG_CADERNO")||"{}");
        if(!base.chat)base.chat={};if(!base.voz)base.voz={};
        const deps=[];
        od.querySelectorAll("#listaDepartamentosChat .campo-descricao").forEach(d=>{const nome=d.querySelector(".campo-nome")?.value?.trim();if(nome)deps.push({nome,agentes:JSON.parse(d.dataset?.agentes||"[]")});});
        if(deps.length)base.chat.departamentos=deps;
        const rt=[];
        od.querySelectorAll("#listaRegrasTempo .campo-descricao, #listaRegrasTempoChat .campo-descricao").forEach(r=>{const nome=r.querySelector(".campo-nome")?.value?.trim();if(nome)rt.push({nome});});
        if(rt.length)base.voz.regras_tempo=rt;
        const ags=[];
        od.querySelectorAll("#listaAgentes .campo-descricao").forEach(a=>{const nome=a.querySelector(".campo-nome")?.value?.trim();if(nome)ags.push({nome});});
        od.querySelectorAll("#listaAgentesChat .campo-descricao").forEach(a=>{const nome=a.querySelector(".campo-nome")?.value?.trim();if(nome&&!ags.find(x=>x.nome===nome))ags.push({nome});});
        if(ags.length){base.voz.agentes=ags;base.chat.agentes=ags;}
        return base;
      }catch(e){}
      try{const raw=window.opener.localStorage.getItem("CONFIG_CADERNO");if(raw)return JSON.parse(raw);}catch(e){}
    }
    const raw=localStorage.getItem("CONFIG_CADERNO");return raw?JSON.parse(raw):{};
  }catch(e){return{};}
}
function atualizarDadosCaderno(){nodes.forEach(n=>renderNode(n));renderConnections();toast(`✓ ${getRegrasTempo().length} regras · ${getDepartamentos().length} dep. · ${getAgentes().length} agentes`);}
function getRegrasTempo(){const d=getDadosCaderno();return[...new Set([...(d.voz?.regras_tempo||[]).map(r=>r.nome),...(d.chat?.regras_tempo||[]).map(r=>r.nome)].filter(Boolean))];}
function getDepartamentos(){return(getDadosCaderno().chat?.departamentos||[]).map(d=>d.nome).filter(Boolean);}
function getAgentes(){const d=getDadosCaderno();return[...new Set([...(d.voz?.agentes||[]).map(a=>a.nome),...(d.chat?.agentes||[]).map(a=>a.nome)].filter(Boolean))];}

const _p=new URLSearchParams(window.location.search);
if(!_p.get("id")){addNode("start",60,80);}else{setTimeout(initFluxoEdit,100);}
setTimeout(atualizarDadosCaderno,800);
</script>
